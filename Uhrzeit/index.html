<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Uhr</title>
<link rel="icon" href="Uhr.png" type="image/png">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Segoe UI", sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  transition: background 6s ease, color 6s ease;
}

/* Uhr */
.clock {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  padding: 40px 60px;
  border-radius: 25px;
  text-align: center;
  box-shadow: 0 20px 50px rgba(0,0,0,0.25);
  z-index: 10;
}

#time {
  font-size: clamp(3rem, 8vw, 6rem);
  font-weight: 700;
}

#date {
  margin-top: 10px;
  font-size: 1.3rem;
  opacity: 0.8;
}

/* 🌞 Minimalistische Apple-Sonne */
.sun {
  position: absolute;
  width: 220px;
  height: 220px;
  border-radius: 50%;
  background:
    radial-gradient(
      circle at 30% 30%,
      rgba(255,255,255,0.9),
      rgba(255,210,120,0.6) 35%,
      rgba(255,180,90,0.35) 55%,
      rgba(255,160,70,0.15) 70%,
      rgba(255,160,70,0.0) 82%
    );
  filter: blur(10px);
  opacity: 0.7;
  pointer-events: none;
}

/* ⭐ Sterne */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0.6;
  pointer-events: none;
}
</style>
</head>

<body>

<div class="clock">
  <div id="time"></div>
  <div id="date"></div>
</div>

<script>
const timeEl = document.getElementById("time");
const dateEl = document.getElementById("date");

/* 🌞 Sonne */
const sun = document.createElement("div");
sun.className = "sun";
document.body.appendChild(sun);

/* ⭐ Sterne */
const stars = [];
const STAR_COUNT = 120;

for (let i = 0; i < STAR_COUNT; i++) {
  const star = document.createElement("div");
  star.className = "star";
  document.body.appendChild(star);

  stars.push({
    el: star,
    baseX: Math.random(),
    baseY: Math.random(),
    driftX: Math.random() * Math.PI * 2,
    driftY: Math.random() * Math.PI * 2,
    speed: 0.0004 + Math.random() * 0.0008
  });
}

/* ⏰ Uhr */
function updateClock() {
  const now = new Date();
  const h = now.getHours();

  timeEl.textContent =
    `${now.getHours()}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}`;

  dateEl.textContent = now.toLocaleDateString("de-DE", {
    weekday: "long",
    day: "2-digit",
    month: "long",
    year: "numeric"
  });

  applyTheme(h);
}

/* 🎨 Tageszeit */
function applyTheme(h) {
  if (h >= 6 && h < 18) {
    document.body.style.background = "linear-gradient(#87CEEB, #FFFFFF)";
    document.body.style.color = "#000";
    sun.style.opacity = 0.7;
    stars.forEach(s => s.el.style.opacity = 0);
  } else if (h >= 18 && h < 21) {
    document.body.style.background = "linear-gradient(#FF8C00, #2C2C54)";
    document.body.style.color = "#fff";
    sun.style.opacity = 0.4;
    stars.forEach(s => s.el.style.opacity = 0.25);
  } else {
    document.body.style.background = "linear-gradient(#0F2027, #203A43)";
    document.body.style.color = "#fff";
    sun.style.opacity = 0;
    stars.forEach(s => s.el.style.opacity = 0.7);
  }
}

/* 🎥 Flüssige Animation */
function animate() {
  const t = Date.now();

  /* Sonne */
  const sunX = (t * 0.004) % (window.innerWidth + 300) - 150;
  const sunY =
    window.innerHeight * 0.28 +
    Math.sin(t * 0.0002) * 35;

  sun.style.transform = `translate(${sunX}px, ${sunY}px)`;

  /* Sterne */
  stars.forEach(s => {
    const x =
      s.baseX * window.innerWidth +
      Math.sin(t * s.speed + s.driftX) * 30;

    const y =
      s.baseY * window.innerHeight +
      Math.cos(t * s.speed + s.driftY) * 30;

    s.el.style.transform = `translate(${x}px, ${y}px)`;
  });

  requestAnimationFrame(animate);
}

setInterval(updateClock, 1000);
updateClock();
animate();
</script>

</body>
</html>
